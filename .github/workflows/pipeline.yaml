name:ci pipeline
on:
  push:
    branches: [ main ]

jobs:   
  build:
    runs-on: ubuntu-lastest
  
  steps:
    -name: checkout code
     uses: actions/checkout@5

    -name: set up node.js
     use: actions/setup-node@v3
     with:
      node-version: 16

    -name: install dependency
     run: npm install

    -name: run test
     run: npm test
